<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>심신 상관관계 & TCI 도감</title>
    <style>
        /* 기본 레이아웃 및 폰트 */
        html { scroll-behavior: smooth; scroll-padding-top: 140px; }
        body { display: flex; margin: 0; font-family: 'Pretendard', -apple-system, sans-serif; background-color: #f8fafc; color: #1e293b; }

        /* 사이드바 */
        .sidebar { 
            width: 60px; height: 100vh; background: #fff; position: fixed; 
            top: 0; left: 0; display: flex; flex-direction: column; 
            align-items: center; box-shadow: 2px 0 15px rgba(0,0,0,0.05); 
            z-index: 1000; overflow-y: auto; padding-top: 20px;
        }
        .sidebar a { text-decoration: none; color: #94a3b8 !important; width: 100%; padding: 12px 0; text-align: center; font-size: 14px; font-weight: 700; transition: 0.3s; }
        .sidebar a:hover { color: #007bff !important; background: #f1f5f9; }
        .sidebar a.active { background: #007bff !important; color: #fff !important; }

        /* 메인 콘텐츠 영역 */
        .content { margin-left: 60px; padding: 40px 20px; width: calc(100% - 60px); max-width: 900px; margin-right: auto; }

        /* 헤더 디자인 (중앙 정렬) */
        header { text-align: center; margin-bottom: 30px; }
        header h1 { font-size: 2.2rem; font-weight: 800; color: #0f172a; margin-bottom: 10px; letter-spacing: -0.02em; }
        header p { color: #64748b; font-size: 1.1rem; line-height: 1.6; margin-bottom: 20px; word-break: keep-all; }

        /* 검색창 */
        .search-container {
            display: flex; justify-content: center; width: 100%; background: rgba(248, 250, 252, 0.95);
            backdrop-filter: blur(10px); padding: 15px 0; position: sticky; top: 0; z-index: 100; margin-bottom: 20px;
        }
        #searchInput {
            width: 90%; max-width: 500px; padding: 16px 28px; font-size: 1rem;
            border: 2px solid #cbd5e1; border-radius: 50px; outline: none; text-align: center;
            transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        #searchInput:focus { border-color: #007bff; box-shadow: 0 8px 25px rgba(0,123,255,0.15); }

        /* 섹션 타이틀 */
        .index-section { padding: 30px 0; border-bottom: 1px solid #e2e8f0; }
        .index-section h2 { font-size: 1.6rem; color: #334155; margin-bottom: 20px; border-left: 6px solid #007bff; padding-left: 15px; }

        /* 버튼 그리드 */
        .link-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; list-style: none; padding: 0; }
        @media (min-width: 768px) { .link-grid { grid-template-columns: repeat(4, 1fr); } }
        .link-grid button { width: 100%; min-height: 60px; background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; cursor: pointer; font-weight: 600; padding: 10px; color: #334155; transition: 0.2s; word-break: keep-all; }
        .link-grid button:hover { border-color: #007bff; color: #007bff; transform: translateY(-3px); }

        /* 모달 시스템 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.9); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(8px); opacity: 0; transition: 0.3s; }
        .modal.show { display: flex; opacity: 1; }
        .card-container { width: 340px; height: 550px; perspective: 1000px; max-width: 90vw; }
        .card { width: 100%; height: 100%; position: relative; transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .card.flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 24px; padding: 35px; box-sizing: border-box; display: flex; flex-direction: column; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        
        .card-front { background: white; justify-content: center; align-items: center; text-align: center; }
        .card-front .symp-title { font-size: 1.8rem; color: #0f172a; margin-bottom: 20px; font-weight: 800; border-bottom: 5px solid #007bff; display: inline-block; }
        .card-front .cause-text { font-size: 1.05rem; color: #475569; line-height: 1.65; word-break: keep-all; }

        .card-back { background: #007bff; color: white; transform: rotateY(180deg); }
        .section-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.2px; opacity: 0.9; margin-bottom: 8px; font-weight: 700; border-left: 3px solid #fff; padding-left: 10px; margin-top: 15px; }
        .affirm-box { font-size: 1.0rem; line-height: 1.5; font-style: normal; font-weight: 600; margin-bottom: 20px; word-break: keep-all; text-align: center; padding: 0 20px; }
        
        .tci-box { background: rgba(255,255,255,0.22); padding: 20px; border-radius: 15px; font-size: 0.9rem; line-height: 1.5; }
        .tci-tag { display: inline-block; background: #fff; color: #007bff; padding: 4px 12px; border-radius: 6px; font-weight: 800; font-size: 0.8rem; margin-bottom: 10px; }

        .close-btn { position: absolute; top: -55px; right: 0; background: none; border: none; color: white; font-size: 3rem; cursor: pointer; }
    </style>
</head>
<body>

    <nav class="sidebar" id="sidebarNav"></nav>

    <main class="content">
        <header>
            <h1>심신 상관관계 백과사전</h1>
        </header>

        <div class="search-container">
            <input type="text" id="searchInput" placeholder="증상을 검색하세요..." onkeyup="filterSymptoms()">
        </div>

        <div id="mainContent"></div>
    </main>

    <div class="modal" id="modal" onclick="closeModal(event)">
        <div class="card-container">
            <button class="close-btn" onclick="closeModal(event)">&times;</button>
            <div class="card" id="flipCard" onclick="flipCard(event)">
                <div class="card-face card-front">
                    <div style="font-size: 2.5rem; margin-bottom: 10px;">🌿</div>
                    <div class="symp-title" id="modalSymptomFront"></div>
                    <div class="cause-text" id="modalCause"></div>
                    <div style="margin-top: 30px; font-size: 0.75rem; color: #94a3b8; font-weight: 700;">TAP TO FLIP</div>
                </div>
                <div class="card-face card-back">
                    <div class="section-label">긍정 확언</div>
                    <div class="affirm-box" id="modalAffirm"></div>
                    <div class="section-label">TCI 기질 분석</div>
                    <div class="tci-box">
                        <div class="tci-tag" id="modalTciTag"></div>
                        <div id="modalTciDesc" style="word-break: keep-all;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>

        // TCI 하위 척도 명칭 변환 함수
        function formatTciTag(rawText) {
            let formatted = rawText;
            const sortedKeys = Object.keys(tciMap).sort((a, b) => b.length - a.length);
            sortedKeys.forEach(key => {
                const regex = new RegExp(`(?<![a-zA-Z0-9])${key}(?![a-zA-Z0-9])`, 'g');
                formatted = formatted.replace(regex, tciMap[key]);
            });
            return formatted;
        }

        // 검색 필터
        function filterSymptoms() {
            const query = document.getElementById('searchInput').value.trim().toLowerCase();
            document.querySelectorAll('.index-section').forEach(section => {
                let hasVisible = false;
                section.querySelectorAll('li').forEach(li => {
                    if (li.innerText.toLowerCase().includes(query)) {
                        li.style.display = "";
                        hasVisible = true;
                    } else {
                        li.style.display = "none";
                    }
                });
                section.style.display = hasVisible ? "" : "none";
            });
        }

        const main = document.getElementById('mainContent');
        const sidebar = document.getElementById('sidebarNav');
        const groups = {};

        function getCho(str) {
            const cho = ["ㄱ", "ㄲ", "ㄴ", "ㄷ", "ㄸ", "ㄹ", "ㅁ", "ㅂ", "ㅃ", "ㅅ", "ㅆ", "ㅇ", "ㅈ", "ㅉ", "ㅊ", "ㅋ", "ㅌ", "ㅍ", "ㅎ"];
            const code = str.charCodeAt(0) - 44032;
            if (code > -1 && code < 11172) {
                const idx = Math.floor(code / 588);
                const map = { "ㄲ":"ㄱ", "ㄸ":"ㄷ", "ㅃ":"ㅂ", "ㅆ":"ㅅ", "ㅉ":"ㅈ" };
                return map[cho[idx]] || cho[idx];
            }
            return "기타";
        }

        symptomsData.forEach(item => {
            const c = getCho(item[0]);
            if(!groups[c]) groups[c] = [];
            groups[c].push(item);
        });

        // 렌더링
        Object.keys(groups).sort().forEach((cho, idx) => {
            const link = document.createElement('a');
            link.href = `#sec-${idx}`;
            link.className = 'nav-link';
            link.innerText = cho;
            sidebar.appendChild(link);

            const sec = document.createElement('section');
            sec.id = `sec-${idx}`;
            sec.className = 'index-section';
            sec.innerHTML = `<h2>${cho}</h2><ul class="link-grid"></ul>`;
            const ul = sec.querySelector('ul');
            groups[cho].forEach(it => {
                const li = document.createElement('li');
                li.innerHTML = `<button onclick="showModal('${it[0]}')">${it[0]}</button>`;
                ul.appendChild(li);
            });
            main.appendChild(sec);
        });

        function showModal(name) {
            const it = symptomsData.find(d => d[0] === name);
            if(!it) return;
            document.getElementById('modalSymptomFront').innerText = it[0];
            document.getElementById('modalCause').innerText = it[1];
            document.getElementById('modalAffirm').innerText = `"${it[2]}"`;
            document.getElementById('modalTciTag').innerText = formatTciTag(it[3]);
            document.getElementById('modalTciDesc').innerText = it[4];
            const m = document.getElementById('modal');
            m.style.display = 'flex';
            setTimeout(() => m.classList.add('show'), 10);
            document.body.style.overflow = 'hidden';
        }

        function closeModal(e) {
            if (e.target.closest('.card') && !e.target.classList.contains('close-btn')) return;
            const m = document.getElementById('modal');
            m.classList.remove('show');
            document.getElementById('flipCard').classList.remove('flipped');
            document.body.style.overflow = 'auto';
            setTimeout(() => m.style.display = 'none', 300);
        }

        function flipCard(e) {
            e.stopPropagation();
            document.getElementById('flipCard').classList.toggle('flipped');
        }

        window.addEventListener('scroll', () => {
            let curr = "";
            document.querySelectorAll('.index-section').forEach(s => {
                if(window.pageYOffset >= s.offsetTop - 150) curr = s.id;
            });
            document.querySelectorAll('.nav-link').forEach(l => {
                l.classList.remove('active');
                if(l.getAttribute('href') === `#${curr}`) l.classList.add('active');
            });
        });
    </script>
</body>
</html>
