<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>심신 상관관계 & TCI 도감</title>
    <style>
        /* 기본 레이아웃 */
        html { scroll-behavior: smooth; scroll-padding-top: 50px; }
        body { display: flex; margin: 0; font-family: 'Pretendard', sans-serif; background-color: #f8fafc; color: #1e293b; }

        /* 사이드바 */
        .sidebar { 
            width: 60px; height: 100vh; background: #fff; position: fixed; 
            top: 0; left: 0; display: flex; flex-direction: column; 
            align-items: center; box-shadow: 2px 0 15px rgba(0,0,0,0.05); 
            z-index: 1000; overflow-y: auto; padding-top: 20px;
        }
/* 사이드바 기본 링크 색상 명확화 */
.sidebar a { 
    text-decoration: none; 
    color: #94a3b8 !important; /* 기본 회색 고정 */
    width: 100%; 
    padding: 12px 0; 
    text-align: center; 
    font-size: 14px; 
    font-weight: 700; 
    transition: 0.3s;
    background: transparent;
}

/* 마우스를 올렸을 때 */
.sidebar a:hover { 
    color: #007bff !important; 
    background: #f1f5f9; 
}

/* 활성화되었을 때 (스크롤 시 해당 섹션) */
.sidebar a.active { 
    background: #007bff !important; 
    color: #fff !important; 
}

        /* 메인 콘텐츠 */
        .content { margin-left: 60px; padding: 30px 20px; width: calc(100% - 60px); max-width: 1200px; }
/* 헤더 전체 컨테이너 */
header { 
    margin-bottom: 40px; 
    padding-bottom: 20px; 
    border-bottom: 2px solid #e2e8f0; /* 선 두께를 줄여 더 세련되게 */
    text-align: center; /* 타이틀 중앙 정렬 */
}

/* 메인 타이틀 */
header h1 { 
    font-size: 2.2rem; /* 크기를 키워 강조 */
    font-weight: 800;
    color: #0f172a; 
    letter-spacing: -0.02em; /* 자간을 줄여 묵직한 느낌 */
    margin: 0 0 12px 0; 
    word-break: keep-all;
}

/* 서브 설명 문구 */
header p { 
    color: #64748b; 
    font-size: 1.1rem; /* 설명글 크기 조정 */
    line-height: 1.6; 
    max-width: 600px; /* 너무 퍼지지 않게 제한 */
    margin: 0 auto; /* 중앙 정렬 */
}

/* 초성 섹션 타이틀 (ㄱ, ㄴ, ㄷ...) */
.index-section h2 { 
    font-size: 1.5rem; /* 섹션 타이틀 크기 */
    color: #334155; 
    font-weight: 700;
    margin-bottom: 25px; 
    padding-left: 12px;
    border-left: 5px solid #007bff; /* 포인트 강조 */
    display: flex; 
    align-items: center; 
}

/* 섹션 타이틀 옆 라인 제거 또는 수정 */
.index-section h2::after { 
    content: ''; 
    flex: 1; 
    height: 1px; 
    background: #e2e8f0; 
    margin-left: 15px; 
}
        /* 카드 버튼 그리드 - 핸드폰 2열 / PC 4열 */
        .link-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 10px; 
            list-style: none; 
            padding: 0; 
        }

        @media (min-width: 1024px) {
            .link-grid { grid-template-columns: repeat(4, 1fr); }
        }

        .link-grid button { 
            width: 100%; min-height: 70px; background: #fff; border: 1px solid #e2e8f0; 
            border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 0.9rem;
            transition: all 0.2s; padding: 10px; line-height: 1.3; color: #334155;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02); word-break: keep-all;
            display: flex; align-items: center; justify-content: center; text-align: center;
        }
        .link-grid button:hover { border-color: #007bff; color: #007bff; background: #f8fbff; }

        /* 모달 시스템 */
        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(15, 23, 42, 0.85); z-index: 2000; justify-content: center; 
            align-items: center; backdrop-filter: blur(8px); opacity: 0; transition: 0.3s;
        }
        .modal.show { display: flex; opacity: 1; }

        .card-container { width: 320px; height: 520px; perspective: 1000px; max-width: 90vw; }
        .card { 
            width: 100%; height: 100%; position: relative; 
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); 
            transform-style: preserve-3d; cursor: pointer;
        }
        .card.flipped { transform: rotateY(180deg); }

        .card-face { 
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden; 
            border-radius: 20px; padding: 30px; box-sizing: border-box; 
            display: flex; flex-direction: column; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        
        .card-front { background: white; justify-content: center; align-items: center; text-align: center; }
        .card-front .symp-title { font-size: 1.8rem; color: #0f172a; margin-bottom: 15px; font-weight: 800; border-bottom: 4px solid #007bff; display: inline-block; }
        .card-front .cause-text { font-size: 1rem; color: #475569; line-height: 1.6; word-break: keep-all; }

        .card-back { background: #007bff; color: white; transform: rotateY(180deg); justify-content: flex-start; }
        .back-header { border-bottom: 1px solid rgba(255,255,255,0.3); padding-bottom: 10px; margin-bottom: 15px; }
        .back-title { font-size: 1.3rem; font-weight: 800; }
        
        .section-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; opacity: 0.9; margin-bottom: 6px; font-weight: 700; border-left: 3px solid #fff; padding-left: 10px; margin-top: 10px; }
        .affirm-box { font-size: 1.1rem; line-height: 1.5; font-style: italic; font-weight: 500; word-break: keep-all; margin-bottom: 15px; }
        .tci-box { background: rgba(255,255,255,0.2); padding: 15px; border-radius: 12px; font-size: 0.9rem; line-height: 1.4; }
        .tci-tag { display: inline-block; background: #fff; color: #007bff; padding: 2px 8px; border-radius: 6px; font-weight: 800; font-size: 0.75rem; margin-bottom: 6px; }

        .close-btn { position: absolute; top: -50px; right: 0; background: none; border: none; color: white; font-size: 3rem; cursor: pointer; }

.search-container {
    display: flex;
    justify-content: center; /* 가로 중앙 정렬 */
    width: 100%;
    background: #f8fafc;
    padding: 15px 0;
    position: sticky;
    top: 0;
    z-index: 100;
}

#searchInput {
    /* 실제 검색창의 폭 조정 */
    width: 90%;          /* 기본적으로 화면의 90% 차지 */
    max-width: 600px;    /* 아무리 화면이 커져도 600px은 넘지 않음 */
    
    padding: 12px 20px;
    font-size: 1rem;
    border: 2px solid #e2e8f0;
    border-radius: 12px;
    outline: none;
    box-shadow: 0 4px 6px rgba(0,0,0,0.05);
}

#searchInput:focus {
    border-color: #007bff;
    box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
}

        @media (max-width: 480px) {
            .content { padding: 20px 15px; }
            .sidebar { width: 50px; }
            .content { margin-left: 50px; width: calc(100% - 50px); }
        }
    </style>
</head>
<body>

    <nav class="sidebar" id="sidebarNav"></nav>

    <main class="content" id="mainContent">
        <header>
            <h1>심신 상관관계 백과사전</h1>
        </header>
<div class="search-container">
    <input type="text" id="searchInput" placeholder="증상 또는 키워드를 검색하세요..." onkeyup="filterSymptoms()">
</div>
    </main>

    <div class="modal" id="modal" onclick="closeModal(event)">
        <div class="card-container">
            <button class="close-btn" onclick="closeModal(event)">&times;</button>
            <div class="card" id="flipCard" onclick="flipCard(event)">
                <div class="card-face card-front">
                    <div style="font-size: 3rem; margin-bottom: 15px;">🌿</div>
                    <div class="symp-title" id="modalSymptomFront"></div>
                    <div class="cause-text" id="modalCause"></div>
                    <div style="margin-top: 30px; font-size: 0.8rem; color: #94a3b8; font-weight: 700;">TAP TO SEE AFFIRMATION</div>
                </div>
                <div class="card-face card-back">
                    <div class="back-header">
                        <div style="font-size: 0.8rem; opacity: 0.8; margin-bottom: 4px;">치유 가이드</div>
                        <div class="back-title" id="modalSymptomBack"></div>
                    </div>
                    <div class="section-label">긍정 확언</div>
                    <div class="affirm-box" id="modalAffirm"></div>
                    <div class="section-label">TCI 기질 분석</div>
                    <div class="tci-box">
                        <div class="tci-tag" id="modalTciTag"></div>
                        <div id="modalTciDesc" style="word-break: keep-all;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const symptomsData = [

            if (code > -1 && code < 11172) {
                const idx = Math.floor(code / 588);
                // 된소리는 기본 자음으로 그룹화
                const map = { "ㄲ":"ㄱ", "ㄸ":"ㄷ", "ㅃ":"ㅂ", "ㅆ":"ㅅ", "ㅉ":"ㅈ" };
                return map[cho[idx]] || cho[idx];
            }
            return "기타";
        }

        symptomsData.forEach(item => {
            const c = getCho(item[0]);
            if(!groups[c]) groups[c] = [];
            groups[c].push(item);
        });

        // 가나다 순서로 정렬하여 렌더링
        const sortedChos = Object.keys(groups).sort((a, b) => a.localeCompare(b, 'ko'));
        
        sortedChos.forEach((cho, idx) => {
            const link = document.createElement('a');
            link.href = `#sec-${idx}`; 
            link.className = 'nav-link'; 
            link.innerText = cho;
            sidebar.appendChild(link);

            const sec = document.createElement('section');
            sec.id = `sec-${idx}`; 
            sec.className = 'index-section';
            sec.innerHTML = `<h2>${cho}</h2><ul class="link-grid"></ul>`;
            
            const ul = sec.querySelector('ul');
            groups[cho].forEach(it => {
                const li = document.createElement('li');
                li.innerHTML = `<button onclick="showModal('${it[0]}')">${it[0]}</button>`;
                ul.appendChild(li);
            });
            main.appendChild(sec);
        });

        function showModal(name) {
            const it = symptomsData.find(d => d[0] === name);
            document.getElementById('modalSymptomFront').innerText = it[0];
            document.getElementById('modalSymptomBack').innerText = it[0];
            document.getElementById('modalCause').innerText = it[1];
            document.getElementById('modalAffirm').innerText = `"${it[2]}"`;
            document.getElementById('modalTciTag').innerText = it[3];
            document.getElementById('modalTciDesc').innerText = it[4];
            
            const m = document.getElementById('modal');
            m.style.display = 'flex';
            setTimeout(() => m.classList.add('show'), 10);
            document.body.style.overflow = 'hidden';
        }

        function closeModal(e) {
            if (e.target.closest('.card') && !e.target.classList.contains('close-btn')) return;
            const m = document.getElementById('modal');
            m.classList.remove('show');
            document.getElementById('flipCard').classList.remove('flipped');
            document.body.style.overflow = 'auto';
            setTimeout(() => m.style.display = 'none', 300);
        }

        function flipCard(e) {
            e.stopPropagation();
            document.getElementById('flipCard').classList.toggle('flipped');
        }
function filterSymptoms() {
    const query = document.getElementById('searchInput').value.toLowerCase();
    const sections = document.querySelectorAll('.index-section');

    sections.forEach(section => {
        const buttons = section.querySelectorAll('.link-grid button');
        let hasVisibleButton = false;

        buttons.forEach(btn => {
            const symptomName = btn.innerText.toLowerCase();
            // 버튼 숨기기/보이기 로직
            if (symptomName.includes(query)) {
                btn.parentElement.style.display = ""; // li 태그 보이기
                hasVisibleButton = true;
            } else {
                btn.parentElement.style.display = "none"; // li 태그 숨기기
            }
        });

        // 해당 초성 섹션에 보여줄 버튼이 하나도 없으면 섹션 자체를 숨김
        if (hasVisibleButton) {
            section.style.display = "";
        } else {
            section.style.display = "none";
        }
    });
}

window.addEventListener('scroll', () => {
    let curr = "";
    const sections = document.querySelectorAll('.index-section');
    
    sections.forEach(s => {
        const top = s.offsetTop;
        const height = s.offsetHeight;
        // 현재 스크롤 위치가 섹션의 범위 안에 있는지 더 정밀하게 체크
        if (window.pageYOffset >= top - 150 && window.pageYOffset < top + height - 150) {
            curr = s.id;
        }
    });

    document.querySelectorAll('.nav-link').forEach(l => {
        l.classList.remove('active');
        // 'ㄴ' 하나만 정확히 매칭되도록 수정
        if (l.getAttribute('href') === `#${curr}`) {
            l.classList.add('active');
        }
    });
});
